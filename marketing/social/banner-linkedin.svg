<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" role="img" aria-label="CVify AI LinkedIn banner">
  <defs>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4053ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4053ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#4053ee" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4053ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#2233aa" flood-opacity="0.28"/>
    </filter>
    <style>
      .wm   { font-family: Inter, system-ui, Arial, sans-serif; font-weight: 800; }
      .tag  { font-family: Inter, system-ui, Arial, sans-serif; font-weight: 600; }
      .url  { font-family: Inter, system-ui, Arial, sans-serif; font-weight: 700; letter-spacing: .04em; }
    </style>
  </defs>

  <rect width="1584" height="396" fill="#ffffff"/>
  <rect width="1584" height="396" fill="url(#glow)"/>
  <!-- brand accent line, echoes the site footer -->
  <rect x="0" y="0" width="1584" height="6" fill="url(#ai)"/>

  <!-- LEFT: wordmark + tagline (kept above the profile-photo safe zone) -->
  <g transform="translate(150,150)">
    <text class="wm" font-size="72" fill="#18181b">CVify <tspan fill="url(#ai)">AI</tspan></text>
    <text class="tag" x="2" y="66" font-size="30" fill="#52525b">Free AI resume &amp; CV builder — hired-ready in minutes.</text>
    <g transform="translate(2,104)">
      <circle cx="8" cy="-8" r="8" fill="#4053ee"/>
      <text class="url" x="26" y="0" font-size="26" fill="#4053ee">cvifyai.com</text>
    </g>
  </g>

  <!-- RIGHT: tilted CV card mockup -->
  <g filter="url(#cardShadow)" transform="translate(1170,60) rotate(4)">
    <rect x="0" y="0" width="300" height="276" rx="20" fill="#ffffff" stroke="#eef0fb"/>
    <rect x="0" y="0" width="300" height="70" rx="20" fill="url(#card)"/>
    <rect x="0" y="40" width="300" height="30" fill="url(#card)"/>
    <circle cx="46" cy="120" r="22" fill="#c7ccff"/>
    <rect x="82" y="106" width="120" height="14" rx="7" fill="#3340c9"/>
    <rect x="82" y="128" width="80" height="10" rx="5" fill="#c7ccff"/>
    <rect x="30" y="176" width="240" height="10" rx="5" fill="#e7e9f7"/>
    <rect x="30" y="198" width="240" height="10" rx="5" fill="#e7e9f7"/>
    <rect x="30" y="220" width="160" height="10" rx="5" fill="#e7e9f7"/>
  </g>
</svg>
