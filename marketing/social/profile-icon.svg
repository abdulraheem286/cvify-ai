<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="CVify AI icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4053ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e2a9e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- brand rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- white CV/document card -->
  <g filter="url(#shadow)">
    <rect x="150" y="120" width="212" height="272" rx="26" fill="#ffffff"/>
    <!-- accent header bar -->
    <rect x="150" y="120" width="212" height="60" rx="26" fill="#4053ee"/>
    <rect x="150" y="150" width="212" height="30" fill="#4053ee"/>
    <!-- avatar dot + name lines -->
    <circle cx="192" cy="222" r="18" fill="#c7ccff"/>
    <rect x="222" y="210" width="96" height="12" rx="6" fill="#3340c9"/>
    <rect x="222" y="230" width="66" height="10" rx="5" fill="#c7ccff"/>
    <!-- body lines -->
    <rect x="186" y="272" width="140" height="10" rx="5" fill="#e2e5f6"/>
    <rect x="186" y="296" width="140" height="10" rx="5" fill="#e2e5f6"/>
    <rect x="186" y="320" width="98" height="10" rx="5" fill="#e2e5f6"/>
    <rect x="186" y="352" width="140" height="10" rx="5" fill="#e2e5f6"/>
  </g>

  <!-- AI sparkle -->
  <g fill="#ffffff">
    <path d="M356 150 c6 22 12 28 34 34 c-22 6 -28 12 -34 34 c-6 -22 -12 -28 -34 -34 c22 -6 28 -12 34 -34 Z"/>
    <path d="M398 116 c3 11 6 14 17 17 c-11 3 -14 6 -17 17 c-3 -11 -6 -14 -17 -17 c11 -3 14 -6 17 -17 Z" opacity="0.85"/>
  </g>
</svg>
